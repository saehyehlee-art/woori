name: uri_iljeong
description: 우리일정 - 친구들과 함께 쓰는 일정 공유 앱
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.3   # 핸드폰 내부에 데이터 저장
  table_calendar: ^3.1.2        # 예쁜 달력 위젯
  intl: ^0.19.0                 # 날짜 형식 변환
  uuid: ^4.4.0                  # 고유 ID 생성
  share_plus: ^9.0.0            # 친구에게 일정 공유
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  # 앱 아이콘은 나중에 추가 가능
